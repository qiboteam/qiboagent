services:
  ai-app:
    build:
      context: .
      dockerfile: docker/Dockerfile # Use the new merged Dockerfile
    container_name: streamlit-ollama-integrated
    ports:
      - "8501:8501"
      - "11434:11434"
    environment:
      - OLLAMA_HOST=127.0.0.1:11434
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  ollama_data:
